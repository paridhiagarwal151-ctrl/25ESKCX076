<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Banana Game</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    transition:1s;
}

#gameImage{
    width:220px;
    height:220px;
    cursor:pointer;
    transition:.3s;
}

#gameImage:hover{
    transform:scale(1.1);
}

h1{
    margin-top:20px;
}

.counter{
    font-size:25px;
    font-weight:bold;
}

#result{
    font-size:35px;
    font-weight:bold;
    color:white;
}

</style>

</head>

<body class="bg-light">

<div class="container text-center mt-5">

<h1>🍎 Apple Banana Game 🍌</h1>

<h3 class="mt-4">
Time Left :
<span id="time">30</span>
</h3>

<div class="row mt-4">

<div class="col-md-6 counter">
🍎 Apple :
<span id="appleScore">0</span>
</div>

<div class="col-md-6 counter">
🍌 Banana :
<span id="bananaScore">0</span>
</div>

</div>

<div class="mt-5">

<img
id="gameImage"
src="https://cdn-icons-png.flaticon.com/512/415/415733.png">

</div>

<h2 class="mt-4" id="currentFruit">
Click the Fruit
</h2>

<h2 class="mt-5" id="result"></h2>

<button class="btn btn-primary mt-4"
onclick="restartGame()">
Restart
</button>

</div>

<script>

let apple=0;
let banana=0;

let time=30;

let gameRunning=true;

  const appleImage = "https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg";

const bananaImage = "https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg";
let currentFruit="apple";

function randomFruit(){

if(!gameRunning)
return;

let random=Math.random();

if(random<0.5){

currentFruit="apple";

document.getElementById("gameImage").src=appleImage;

document.getElementById("currentFruit").innerHTML="🍎 Click Apple";

}
else{

currentFruit="banana";

document.getElementById("gameImage").src=bananaImage;

document.getElementById("currentFruit").innerHTML="🍌 Click Banana";

}

}

document.getElementById("gameImage").onclick=function(){

if(!gameRunning)
return;

if(currentFruit=="apple"){

apple++;

document.getElementById("appleScore").innerHTML=apple;

}
else{

banana++;

document.getElementById("bananaScore").innerHTML=banana;

}

randomFruit();

}

randomFruit();

let timer=setInterval(function(){

time--;

document.getElementById("time").innerHTML=time;

if(time==0){

clearInterval(timer);

gameRunning=false;

document.getElementById("gameImage").style.display="none";

let body=document.body;

body.classList.remove("bg-light");

if(apple>banana){

body.classList.add("bg-success");

document.getElementById("result").innerHTML=
"🏆 Apple Wins!";

}

else if(banana>apple){

body.classList.add("bg-warning");

document.getElementById("result").innerHTML=
"🏆 Banana Wins!";

}

else{

body.classList.add("bg-primary");

document.getElementById("result").innerHTML=
"It's a Tie!";

}

}

},1000);

function restartGame(){

location.reload();

}

</script>

</body>
</html>
